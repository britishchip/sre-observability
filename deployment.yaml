apiVersion: apps/v1
kind: Deployment
metadata:
  name: sre-app
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sre-app
  template:
    metadata:
      labels:
        app: sre-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: sre-app
        image: sre-app:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: sre-app
  namespace: monitoring
spec:
  selector:
    app: sre-app
  ports:
  - port: 5000
    targetPort: 5000
